version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: nihao-buddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mandarin_buddy
    ports:
      - "5432:5432"
    volumes:
      - nihao_buddy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mandarin_buddy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nihao_buddy_postgres_data:
